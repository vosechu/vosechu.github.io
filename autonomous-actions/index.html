<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Autonomous actions: circuit breakers and bulkheads</title>
  <style>
    :root {
      --bg: #fdf6e9;
      --panel: rgba(255, 251, 242, 0.78);
      --panel-solid: #fffaf0;
      --border: #e8d9bd;
      --ink: #2b1d10;
      --ink-dim: #4a3826;
      --teal: #14532d;
      --red: #8f2c22;
      --amber: #7a4a0f;
      --blue: #3b4fd1;
      --ok: #14532d;
      --station-core: #3b4fd1;   /* blueberry, was Database A */
      --station-slow: #12a678;   /* mint, was Service B */
      --station-hang: #d94f3d;   /* tomato, was Service C */
      --station-3p:   #e08a1e;   /* marmalade, was External */
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background:
        radial-gradient(1200px 700px at 50% -10%, #fffcf4 0%, var(--bg) 60%),
        var(--bg);
      color: var(--ink);
      font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    /* Left column stacks the diagram and its caption; the controls panel is a
       separate full-height right column, so its sliders never push the caption
       down (the caption stays under the diagram, at diagram width). */
    .layout {
      display: flex;
      gap: 16px;
      padding: 10px 18px 18px;
      align-items: stretch;
    }
    .leftcol { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 16px; }
    #panel { width: 200px; flex: none; }
    .stagewrap {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px 4px;
      backdrop-filter: blur(6px);
    }
    .info { position: relative; cursor: help; color: var(--ink-dim); }
    .info .tip {
      display: none; position: absolute; bottom: 150%; left: 50%; transform: translateX(-50%);
      width: 230px; background: var(--panel-solid); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 10px; font-size: 11px; font-weight: 400; color: var(--ink); line-height: 1.45; z-index: 20;
    }
    .info:hover .tip, .info:focus .tip { display: block; }

    /* Tokenized copy: [[terms]] are dotted-underline glossary hovers (same
       tip visual as the bar's info hovers); {{chips}} echo a control label. */
    .term { position: relative; text-decoration: underline dotted; text-underline-offset: 2px; cursor: help; }
    .term .tip {
      display: none; position: absolute; bottom: 140%; left: 50%; transform: translateX(-50%);
      width: 240px; background: var(--panel-solid); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 10px; font-size: 11px; font-weight: 400; color: var(--ink); line-height: 1.45; z-index: 70;
    }
    .term:hover .tip, .term:focus .tip { display: block; }
    .ctl {
      font-size: 0.85em; font-weight: 650; padding: 0 0.35em; white-space: nowrap;
      border: 1px solid var(--border); border-radius: 0.5em; background: var(--panel);
    }

    /* Fixed bottom status bar: every metric, always visible, no progressive
       reveal. The first two slots (availability, p95) are the SLO metrics and
       carry a pass/fail state; the rest are plain counters. */
    body { padding-bottom: 64px; }   /* keep content clear of the fixed bar */
    #statusbar {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;
      display: flex; align-items: stretch; gap: 0;
      background: var(--panel-solid); border-top: 1px solid var(--border);
      box-shadow: 0 -2px 10px rgba(43,29,16,0.08);
      overflow: visible;   /* was overflow-x:auto, which forces overflow-y:auto and clipped the ⓘ tips popping up over the diagram */
    }
    .barslot {
      flex: 1; min-width: 96px; padding: 8px 14px;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; justify-content: center; gap: 2px;
    }
    .barslot:last-child { border-right: none; }
    .barslot.emph { flex: 1.6; }
    .barslot .baglabel { font-size: 11px; color: var(--ink-dim); display: flex; align-items: center; gap: 5px; }
    .barslot .bagvalue { font-size: 19px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
    .barslot.emph .bagvalue { font-size: 23px; }
    .barslot.pass .bagvalue { color: var(--teal); }
    .barslot.fail .bagvalue { color: var(--red); }

    /* Panels */
    #panel, #tour {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 15px;
      backdrop-filter: blur(6px);
    }
    #panel h2, #tour h2 {
      margin: 0 0 10px; font-size: 11px; text-transform: uppercase;
      letter-spacing: 1.4px; color: var(--ink-dim); font-weight: 700;
    }
    .panelhead { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .panelhead h2 { margin: 0; }
    .panelhead .reset { font-size: 11px; padding: 3px 9px; }
    .control { display: block; margin: 0 0 11px; }
    .control .lab { display: flex; justify-content: space-between; font-size: 12px; color: var(--ink-dim); margin-bottom: 3px; }
    .control .lab b { color: var(--ink); font-variant-numeric: tabular-nums; }
    input[type=range] {
      width: 100%; accent-color: var(--teal); background: transparent; cursor: pointer;
    }
    .control.toggle { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--ink-dim); }
    .control.toggle input { accent-color: var(--teal); width: auto; cursor: pointer; }
    .ctlrow { display: flex; gap: 10px; }
    .ctlrow .control { flex: 1; min-width: 0; }
    /* Hovering or focusing a {{chip}} in the copy pulses the control it names,
       so a lost player's eye lands on the exact knob. Its collapsed section is
       auto-opened in JS; this is just the soft teal "look here" ring. */
    .control.pulse { border-radius: 7px; animation: controlPulse 0.85s ease-in-out infinite; }
    @keyframes controlPulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(20, 83, 45, 0); }
      50%      { box-shadow: 0 0 0 2px rgba(20, 83, 45, 0.55); }
    }
    /* Collapsible control sections (native <details>), separated by a divider, no box. */
    details.section { margin: 6px 0 0; padding-top: 6px; border-top: 1px solid var(--border); }
    details.section > summary {
      cursor: pointer; user-select: none; list-style: none; display: flex; align-items: center; gap: 8px;
      padding: 4px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--ink-dim); font-weight: 700;
    }
    details.section > summary::-webkit-details-marker { display: none; }
    details.section > summary::before { content: '\25B8'; font-size: 13px; color: var(--ink-dim); transition: transform .15s ease; }
    details.section[open] > summary::before { transform: rotate(90deg); }
    @keyframes sectionEnter { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes sectionFlash { 0% { background: rgba(20, 83, 45, 0.16); } 100% { background: transparent; } }
    details.section.enter { animation: sectionEnter 0.3s ease, sectionFlash 1.3s ease 0.05s; }

    /* Tour bar */
    .tourhead { display: flex; align-items: center; gap: 12px; }
    .acttitle { font-size: 15px; font-weight: 650; flex: 1; }
    #act-instruction { margin: 10px 0 0; color: var(--teal); font-weight: 600; max-width: 78ch; }
    #act-caption { margin: 6px 0 0; color: var(--ink); max-width: 78ch; }
    button {
      background: #fff3dc; color: var(--ink); border: 1px solid var(--border);
      border-radius: 9px; padding: 7px 13px; font: inherit; font-size: 13px; cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    button:hover { background: #ffe9bd; border-color: #e0c48a; }
    .progress { display: flex; gap: 6px; margin-left: auto; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #e8d9bd; cursor: pointer; }
    .dot:hover { background: var(--ink-dim); }
    .dot.on { background: var(--teal); box-shadow: 0 0 8px var(--teal); }
    #readout {
      margin-top: 10px; font-size: 12.5px; color: var(--amber);
      font-variant-numeric: tabular-nums; min-height: 1em;
    }

    .edge { stroke: #e8d9bd; stroke-width: 3; fill: none; }
    .edge-flow {
      stroke: var(--teal); stroke-width: 3; fill: none;
      stroke-dasharray: 6 9; stroke-dashoffset: 0; opacity: 0.12;
    }
    .edge-flow.active { opacity: 0.95; animation: flow 0.55s linear infinite; }
    .edge-flow.congested { stroke: var(--amber); opacity: 0.95; animation: flow 2.6s linear infinite; }
    .edge-flow.danger { stroke: var(--red); opacity: 0.85; stroke-dasharray: 2 7; animation: none; }
    @keyframes flow { to { stroke-dashoffset: -15; } }

    /* Diagram is now DOM boxes (rem-sized) plus one SVG arrow overlay. */
    #stage.diagram { position: relative; min-width: 46rem; }   /* legibility floor: ~the trimmed content width, so deps never spread off-screen */
    .stagewrap { overflow-x: auto; }
    .diagram .edges {                       /* arrow overlay, behind the boxes */
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: visible;
    }
    .diagram .cols {
      position: relative; z-index: 1;       /* boxes paint over the arrows */
      display: flex; align-items: center; gap: 1rem; padding: 0.5rem;
      justify-content: space-between;       /* window slack goes between the columns, not inside boxes */
    }
    .diagram .col-deps { display: flex; flex-direction: column; gap: 1rem; }
    .box {
      position: relative;   /* anchors the absolutely positioned .fire glyph */
      background: var(--panel-solid); border: 1px solid var(--border);
      border-radius: 0.6rem; padding: 0.6rem 0.7rem; min-width: 9rem;
    }
    /* Client box carries only "Client / retries"; trim its floor so it does not
       eat width the diagram needs to sit beside the panel at ~1024px. */
    .box.client { min-width: 6rem; }
    /* Fixed dep width so per-frame text can never resize the box (hot-path
       rule: render() must not move layout, or the arrows go stale). The
       service box needs no width: every column in its grid is fixed (see
       .egress.call), so it sizes to exactly fit its content. */
    .box.dep { cursor: pointer; border-color: var(--depcolor); width: 11rem; }
    /* Selection is a neutral ink ring: teal would read as a health state. */
    .box.dep.selected { box-shadow: 0 0 0 2px var(--ink); }
    .box.dep.slow { border-color: var(--amber); }
    .box.dep.faulted { border-color: var(--red); }
    /* Non-color redundant cue for a failing box: absolutely positioned so it
       never affects the box's outer size (hot-path rule), hidden by default. */
    .box .fire {
      position: absolute; top: 0.2rem; right: 0.3rem;
      font-size: 0.65rem; line-height: 1; opacity: 0; pointer-events: none;
    }
    .box .fire.show { opacity: 1; }
    .box .label { font-size: 0.85rem; font-weight: 650; color: var(--ink); }
    /* One line, clipped: per-frame text (the capacity readout) must never wrap
       and change the box's height (hot-path rule). */
    .box .sub { font-size: 0.7rem; color: var(--ink-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    /* Worker / connection cells: a wrapping grid of small squares. */
    .cells { display: flex; flex-wrap: wrap; gap: 0.15rem; margin-top: 0.35rem; }
    .cell { width: 0.55rem; height: 0.55rem; border-radius: 0.12rem; background: var(--slot-idle, #d8cebc); }
    .cell.busy { background: var(--teal); }
    .cell.walled { background: transparent; outline: 1px solid var(--red); opacity: 0.5; }
    /* Past the live pool size: absent, not just dim. visibility (not display)
       keeps the cell's layout slot so the grid never reflows -- hot-path rule. */
    .cell.hidden { visibility: hidden; }
    /* Queue: a fixed-height track with a bottom-anchored fill. */
    .queue { position: relative; width: 0.5rem; height: 3rem; border-radius: 0.25rem;
      background: var(--slot-idle, #d8cebc); }
    .queue .fill { position: absolute; left: 0; right: 0; bottom: 0; height: 0;
      background: var(--amber); border-radius: 0.25rem; transition: height .2s ease; }
    /* Horizontal variant: lies in the 4rem name column of the incoming row
       (filling left to right), so the worker grid beside it starts exactly
       where the outbound connections column starts. */
    /* Top-aligned so the bar sits level with the first row of worker cells,
       and 0.25rem narrower than its column for breathing room before the
       cells; the column widths stay untouched so the grids keep their exact
       alignment with the outbound rows. */
    .queue.h { width: calc(100% - 0.25rem); height: 0.55rem; align-self: start; }
    .queue.h .fill { top: 0; bottom: 0; left: 0; right: auto; width: 0; height: auto; transition: width .2s ease; }
    /* Pills: fixed min-width so a value change never reflows. */
    .pill { display: inline-block; min-width: 3.2rem; text-align: center;
      font-size: 0.68rem; padding: 0.1rem 0.4rem; border-radius: 0.8rem;
      border: 1px solid var(--border); color: var(--ink-dim); }
    .pill.breaker.closed { color: var(--teal); }
    .pill.breaker.open   { color: var(--red); }
    .pill.breaker.half_open { color: var(--amber); }
    /* Egress rows inside Our service: one per dependency. */
    .egress { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.35rem; }
    .egress .tag { min-width: 4rem; font-size: 0.72rem; color: var(--ink-dim); }
    /* Tiny widget labels ("queue", "workers", column headers). */
    .micro { font-size: 0.6rem; color: var(--ink-dim); letter-spacing: 0.4px; }
    .micro.heading { margin-top: 0.6rem; text-transform: uppercase; letter-spacing: 1px; }
    /* Outbound call rows align into labeled columns (header row shares the grid).
       The connections column is sized to exactly one row of 10 cells (cell
       0.55rem, gap 0.15rem, plus a hair of rounding slack), so the service box
       stays narrow enough to sit beside the controls panel at ~1024px: the 30
       connection cells wrap into three aligned rows of 10, and the 60 worker
       cells above wrap into six. */
    .egress.call { display: grid; grid-template-columns: 4rem calc(10 * 0.55rem + 9 * 0.15rem + 0.1rem) 3.6rem 4.2rem 3.6rem; gap: 0.4rem; align-items: center; }
    .egress.call .cells { margin-top: 0; }
    /* Center the pill columns (cap, breaker, timeout) and their headers over
       each other; the connections grid stays left-aligned. */
    .egress.call > :nth-child(n+3) { justify-self: center; text-align: center; }
    /* A protection that is not configured on this call (no breaker / no bulkhead). */
    .pill.off { opacity: 0.55; }
    /* Dependency-box row: same queue-then-workers language as the incoming
       section, sized for the narrower box (capacity 12 fits one cell row). */
    .egress.deprow { display: grid; grid-template-columns: 2.8rem 1fr; gap: 0.4rem; align-items: center; }
    .egress.deprow .cells { margin-top: 0; }
    /* Open-breaker edge: greyed, no flow. */
    .edge-flow.blocked { stroke: var(--ink-dim); opacity: 0.3; animation: none; stroke-dasharray: 2 6; }

    input[type=range]:disabled { accent-color: var(--ink-dim); opacity: 0.55; cursor: not-allowed; }

    /* Guided tour: a welcome dialog (step 0) plus one reusable bubble that
       positionBubble (controls.js) moves to its anchor for steps 1-4. The
       whats-new bubble reuses the same style. Overlays only; the sim keeps
       running underneath (no pause, no dimming of the page). */
    #tour-overlay { position: fixed; inset: 0; z-index: 90; pointer-events: none; }
    #tour-overlay.hidden { display: none; }
    #tour-welcome {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: min(440px, 86vw); background: var(--panel-solid); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 22px; box-shadow: 0 12px 32px rgba(43,29,16,0.28);
      pointer-events: auto;
    }
    #tour-welcome p { margin: 0 0 14px; color: var(--ink); line-height: 1.5; }
    .tourbubble {
      position: fixed; width: min(300px, 80vw); background: var(--panel-solid);
      border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px;
      box-shadow: 0 8px 24px rgba(43,29,16,0.24); pointer-events: auto;
    }
    .tourbubble p { margin: 0 0 12px; color: var(--ink); line-height: 1.5; font-size: 13px; }
    .tourbubble.hidden { display: none; }
    #whatsnew { z-index: 85; }
    /* Red notification dot on the Tour button: an act unlocked new controls
       while the tour was skipped. Cleared when the tour is opened. */
    .tour-rerun-btn { position: relative; }
    .tour-rerun-btn.dot::after {
      content: ''; position: absolute; top: -3px; right: -3px;
      width: 9px; height: 9px; border-radius: 50%; background: var(--red);
    }
    .tourfoot { display: flex; align-items: center; gap: 8px; }
    .tourfoot .tourstep { font-size: 11px; color: var(--ink-dim); margin-right: auto; }
    .tourfoot button { font-size: 12px; padding: 5px 10px; }

    /* "Fork me on GitHub" corner ribbon (pure CSS, no external asset). */
    .forkribbon { position: fixed; top: 0; left: 0; width: 150px; height: 150px; overflow: hidden; z-index: 50; pointer-events: none; }
    .forkribbon a {
      position: absolute; top: 34px; left: -42px; width: 200px; padding: 6px 0;
      transform: rotate(-45deg); text-align: center; pointer-events: auto; text-decoration: none;
      background: var(--teal); color: var(--bg); font-size: 12px; font-weight: 700; letter-spacing: 0.3px;
      box-shadow: 0 2px 8px rgba(43,29,16,0.25);
      border-top: 1px solid rgba(255,255,255,0.4); border-bottom: 1px solid rgba(43,29,16,0.25);
    }
    .forkribbon a:hover { background: #1c6b3a; }
    @media (max-width: 900px) {
      .forkribbon { display: none; }
    }

  </style>
</head>
<body>
  <div class="forkribbon"><a href="https://github.com/vosechu/vosechu.github.io" target="_blank" rel="noopener">Fork me on GitHub</a></div>

  <div class="layout">
    <div class="leftcol">
      <div class="stagewrap">
        <div id="stage" role="img" aria-label="system topology"></div>
      </div>

      <div id="tour">
        <div class="tourhead">
          <span class="acttitle" id="act-title"></span>
          <div class="progress" id="progress"></div>
          <button id="back">Back</button>
          <button class="tour-rerun-btn">Tour</button>
          <button id="next">Next</button>
        </div>
        <p id="act-instruction"></p>
        <p id="act-caption"></p>
        <div id="readout"></div>
      </div>
    </div>

    <div id="panel"><h2>Controls</h2></div>
  </div>

  <div id="statusbar">
    <div class="barslot emph" id="bar-availability">
      <span class="baglabel"><span id="bar-availability-label"></span><span class="info" tabindex="0"> &#9432;<span class="tip" id="bar-availability-hover"></span></span></span>
      <span class="bagvalue" id="bar-availability-value">100%</span>
    </div>
    <div class="barslot emph" id="bar-p95">
      <span class="baglabel"><span id="bar-p95-label"></span><span class="info" tabindex="0"> &#9432;<span class="tip" id="bar-p95-hover"></span></span></span>
      <span class="bagvalue" id="bar-p95-value">0 ms</span>
    </div>
    <div class="barslot" id="bar-throughput">
      <span class="baglabel"><span id="bar-throughput-label"></span><span class="info" tabindex="0"> &#9432;<span class="tip" id="bar-throughput-hover"></span></span></span>
      <span class="bagvalue" id="bar-throughput-value">0</span>
    </div>
    <div class="barslot" id="bar-errors">
      <span class="baglabel"><span id="bar-errors-label"></span><span class="info" tabindex="0"> &#9432;<span class="tip" id="bar-errors-hover"></span></span></span>
      <span class="bagvalue" id="bar-errors-value">0</span>
    </div>
    <div class="barslot" id="bar-queue">
      <span class="baglabel"><span id="bar-queue-label"></span><span class="info" tabindex="0"> &#9432;<span class="tip" id="bar-queue-hover"></span></span></span>
      <span class="bagvalue" id="bar-queue-value">0</span>
    </div>
    <div class="barslot" id="bar-rejects">
      <span class="baglabel"><span id="bar-rejects-label"></span><span class="info" tabindex="0"> &#9432;<span class="tip" id="bar-rejects-hover"></span></span></span>
      <span class="bagvalue" id="bar-rejects-value">0</span>
    </div>
  </div>

  <div id="tour-overlay" class="hidden">
    <div id="tour-welcome">
      <p id="tour-welcome-text"></p>
      <div class="tourfoot">
        <span class="tourstep" id="tour-welcome-step"></span>
        <button id="tour-skip">Skip</button>
        <button id="tour-next">Next</button>
      </div>
    </div>
    <div class="tourbubble" id="tourbubble">
      <p id="tourbubble-text"></p>
      <div class="tourfoot">
        <span class="tourstep" id="tourbubble-step"></span>
        <button class="tour-skip-btn">Skip</button>
        <button class="tour-prev-btn">Back</button>
        <button class="tour-next-btn">Next</button>
      </div>
    </div>
  </div>

  <div class="tourbubble hidden" id="whatsnew">
    <p id="whatsnew-text"></p>
    <div class="tourfoot">
      <button id="whatsnew-done">Done</button>
    </div>
  </div>

  <script type="module" src="./src/controls.js"></script>
</body>
</html>
